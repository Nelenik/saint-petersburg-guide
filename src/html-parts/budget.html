<section class="budget" id="budget">
  <div class="container budget__container">
    <h2 class="budget__title title wow fadeIn">
      Travel Budget
    </h2>
    <div class="budget__descr">
      <p class="budget__text wow fadeInRight">
        Before your trip, you need to estimate approximately how much budget you will need for your travel.
      </p>
    </div>
    <ul class="list-reset budget__list wow fadeInUp" data-wow-delay="0.5s">
      <li class="budget__item budget__item--living">
        <h3 class="budget__position">Accommodation</h3>
        <span class="budget__price">from $24</span>
      </li>
      <li class="budget__item budget__item--meals">
        <h3 class="budget__position">Average restaurant bill</h3>
        <span class="budget__price">$16</span>
      </li>
      <li class="budget__item budget__item--museum">
        <h3 class="budget__position">Excursions</h3>
        <span class="budget__price">from $12</span>
      </li>
      <li class="budget__item budget__item--souvenir">
        <h3 class="budget__position">Souvenirs</h3>
        <span class="budget__price">from $4</span>
      </li>
    </ul>
  </div>
</section>
